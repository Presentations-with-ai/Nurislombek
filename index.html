<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <title>Экономическая Виселица: Категории</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
            --text: #f8fafc;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; 
        }

        #game-container { 
            background: var(--card); 
            padding: 40px; border-radius: 30px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6); 
            text-align: center; max-width: 900px; width: 90%; 
            border: 2px solid rgba(255,255,255,0.05);
        }

        .category-label { color: var(--accent); font-size: 1em; letter-spacing: 3px; font-weight: bold; margin-bottom: 5px; }
        #category-text { font-size: 2.5em; font-weight: 800; margin-bottom: 20px; color: #fff; text-transform: uppercase; }

        #hangman-svg { margin: 10px 0; filter: drop-shadow(0 0 15px rgba(0,0,0,0.5)); }
        .hangman-part { stroke: var(--text); stroke-width: 4; fill: none; opacity: 0; transition: opacity 0.4s ease; }
        .gallows { stroke: #475569; stroke-width: 6; fill: none; }

        #word-display { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 30px 0; }
        .letter-box { 
            width: 50px; height: 60px; background: rgba(15, 23, 42, 0.8); 
            border: 2px solid #334155; display: flex; align-items: center; 
            justify-content: center; font-size: 2em; font-weight: 900; 
            border-radius: 12px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            color: transparent;
        }
        .letter-box.revealed { color: #fff; background: var(--accent); border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.5); }

        .keyboard { display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .kb-row { display: flex; gap: 8px; }
        .key { 
            background: #334155; border: none; width: 50px; height: 50px; 
            color: white; font-size: 1.2em; border-radius: 10px; cursor: pointer; 
            transition: 0.2s; font-weight: bold;
        }
        .key:hover:not(:disabled) { background: var(--accent); transform: scale(1.1); }
        .key:disabled { opacity: 0.15; cursor: not-allowed; }
        .key.correct { background: var(--success) !important; }
        .key.wrong { background: var(--danger) !important; }

        .status-msg { font-size: 2em; font-weight: 900; margin: 20px 0; display: none; }
        .btn-action { 
            background: #fff; color: #000; border: none; 
            padding: 15px 40px; font-size: 1.2em; border-radius: 15px; 
            cursor: pointer; font-weight: 800; margin-top: 20px; display: none;
            transition: 0.3s;
        }
        .btn-action:hover { background: var(--accent); color: #fff; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="category-label">КАТЕГОРИЯ</div>
        <div id="category-text">ЗАГРУЗКА...</div>
        
        <svg id="hangman-svg" width="160" height="180" viewBox="0 0 160 200">
            <path class="gallows" d="M 20 180 L 140 180 M 40 180 L 40 20 L 110 20 L 110 40" />
            <circle class="hangman-part" id="head" cx="110" cy="55" r="15" />
            <line class="hangman-part" id="body" x1="110" y1="70" x2="110" y2="120" />
            <line class="hangman-part" id="arm-l" x1="110" y1="80" x2="85" y2="105" />
            <line class="hangman-part" id="arm-r" x1="110" y1="80" x2="135" y2="105" />
            <line class="hangman-part" id="leg-l" x1="110" y1="120" x2="90" y2="155" />
            <line class="hangman-part" id="leg-r" x1="110" y1="120" x2="130" y2="155" />
        </svg>

        <div id="word-display"></div>
        <div class="keyboard" id="keyboard"></div>
        <div id="status" class="status-msg"></div>
        <button id="restart-btn" class="btn-action" onclick="initRound()">СЛЕДУЮЩИЙ ТУР</button>
    </div>

    <script>
        const rounds = [
            { cat: "Денежные процессы", a: "ИНФЛЯЦИЯ" },
            { cat: "Рыночные отношения", a: "КОНКУРЕНЦИЯ" },
            { cat: "Ценные бумаги", a: "ОБЛИГАЦИЯ" },
            { cat: "Рыночные структуры", a: "МОНОПОЛИЯ" },
            { cat: "Госбюджет", a: "ДЕФИЦИТ" },
            { cat: "Налоговая система", a: "АКЦИЗ" },
            { cat: "Банковская система", a: "ДЕПОЗИТ" },
            { cat: "Корпоративное право", a: "ДИВИДЕНД" },
            { cat: "Валютные процессы", a: "ДЕВАЛЬВАЦИЯ" },
            { cat: "Собственность", a: "ПРИВАТИЗАЦИЯ" },
            { cat: "Рыночные структуры", a: "ОЛИГОПОЛИЯ" },
            { cat: "Торговый баланс", a: "ЭКСПОРТ" },
            { cat: "Экономическая теория", a: "МАКРОЭКОНОМИКА" },
            { cat: "Юридические лица", a: "БАНКРОТСТВО" },
            { cat: "Денежные реформы", a: "ДЕНОМИНАЦИЯ" },
            { cat: "Рыночные структуры", a: "МОНОПСОНИЯ" },
            { cat: "Внешняя политика", a: "ПРОТЕКЦИОНИЗМ" },
            { cat: "Ценные бумаги", a: "ВЕКСЕЛЬ" },
            { cat: "Мировая экономика", a: "ЭМБАРГО" },
            { cat: "Макроэкономика", a: "СТАГФЛЯЦИЯ" }
        ];

        const rows = ["ЙЦУКЕНГШЩЗХЪ", "ФЫВАПРОЛДЖЭ", "ЯЧСМИТЬБЮ"];
        const bodyParts = ["head", "body", "arm-l", "arm-r", "leg-l", "leg-r"];
        let currentRound = 0;
        let wrongGuesses = 0;
        let isGameOver = false;

        function initRound() {
            wrongGuesses = 0;
            isGameOver = false;
            document.getElementById('status').style.display = 'none';
            document.getElementById('restart-btn').style.display = 'none';
            document.querySelectorAll('.hangman-part').forEach(p => p.style.opacity = '0');
            
            const round = rounds[currentRound];
            document.getElementById('category-text').innerText = round.cat;
            
            const display = document.getElementById('word-display');
            display.innerHTML = "";
            for (let char of round.a) {
                const box = document.createElement('div');
                box.className = "letter-box";
                box.innerText = char;
                display.appendChild(box);
            }
            createKeyboard();
        }

        function createKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = "";
            rows.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = "kb-row";
                row.split("").forEach(l => {
                    const btn = document.createElement('button');
                    btn.className = "key";
                    btn.innerText = l;
                    btn.onclick = () => checkLetter(l, btn);
                    rowDiv.appendChild(btn);
                });
                kb.appendChild(rowDiv);
            });
        }

        function checkLetter(l, btn) {
            if (isGameOver) return;
            const word = rounds[currentRound].a;
            const boxes = document.querySelectorAll('.letter-box');
            let found = false;

            btn.disabled = true;
            for (let i = 0; i < word.length; i++) {
                if (word[i] === l) {
                    boxes[i].classList.add('revealed');
                    found = true;
                }
            }

            if (found) {
                btn.classList.add('correct');
                if ([...boxes].every(b => b.classList.contains('revealed'))) endGame(true);
            } else {
                btn.classList.add('wrong');
                document.getElementById(bodyParts[wrongGuesses]).style.opacity = '1';
                wrongGuesses++;
                if (wrongGuesses === bodyParts.length) endGame(false);
            }
        }

        function endGame(isWin) {
            isGameOver = true;
            const status = document.getElementById('status');
            status.style.display = 'block';
            status.innerText = isWin ? "ПОБЕДА!" : "ДЕФОЛТ!";
            status.style.color = isWin ? "var(--success)" : "var(--danger)";
            if (!isWin) document.querySelectorAll('.letter-box').forEach(b => b.classList.add('revealed'));
            currentRound = (currentRound + 1) % rounds.length;
            document.getElementById('restart-btn').style.display = 'inline-block';
        }

        initRound();
    </script>
</body>
</html>
